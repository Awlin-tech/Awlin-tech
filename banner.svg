<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0c3fc"/>
      <stop offset="100%" style="stop-color:#8ec5fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" fill="url(#bg)" rx="14"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.06"/>
  </pattern>
  <rect width="800" height="180" fill="url(#dots)" rx="14"/>

  <!-- Accent line left -->
  <rect x="40" y="55" width="4" height="70" rx="2" fill="url(#textGrad)" opacity="0.9"/>

  <!-- Name -->
  <text x="62" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="2">Awlin Sajan</text>

  <!-- Subtitle -->
  <text x="64" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" fill="#a0b4cc" letter-spacing="3">FULL STACK DEVELOPER  ·  INDIA</text>

  <!-- Decorative circles top right -->
  <circle cx="730" cy="38" r="28" fill="#ffffff" opacity="0.03"/>
  <circle cx="760" cy="55" r="18" fill="#8ec5fc" opacity="0.07"/>
  <circle cx="700" cy="155" r="22" fill="#e0c3fc" opacity="0.05"/>
</svg>
